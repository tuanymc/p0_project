# =============================================================================
#  configs/junyi.yaml -- example P0 config for Junyi Academy
#
#  Notes:
#   * `has_dag: true` because Junyi ships a ground-truth prerequisite DAG.
#     For datasets without one (e.g. ASSISTments 2012) set `has_dag: false`
#     and let `graph_builder.infer_prerequisites_from_train` do its thing.
#   * All randomness flows from `seed`. Seeded PyTorch/NumPy/random.
#   * Augmentation `seeds` has multiple entries to compute DDR mean/std.
# =============================================================================

dataset: junyi
raw_path: data/raw/junyi/
# Chang et al. (EDM 2015) release: exercise-level log (not Khan-style uuid/upid/ucid columns).
raw_interactions_file: data/raw/junyi/junyi_ProblemLog_original.csv
processed_path: data/processed/junyi.parquet
has_dag: true

# --- Schema mapping from raw CSV to canonical column names ---
# Hash exercise name into item_id and kc_id so inferred transitions align with
# relationship_annotation_* / junyi_dag.csv (Exercise_A / Exercise_B).
schema_mapping:
  user_id: user_id
  item_id: exercise
  kc_id: exercise
  timestamp: time_done
  correct: correct

# --- Splitting protocol ---
split:
  type: learner_temporal     # learner_based + temporal ordering
  ratios: [0.7, 0.1, 0.2]    # train / valid / test
  seed: 42
  n_folds: 3                 # folds are streamed one-at-a-time (see learner_based_folds); use 1 if RAM is still tight

# --- Train-only graph construction ---
graph:
  e_pre_source: inferred              # train-only temporal precedence (ground_truth path unused in builder)
  e_pre_dag_path: data/raw/junyi/junyi_dag.csv
  e_pre_support_quantile: 0.95
  e_pre_top_k_per_node: 5
  e_pre_max_edges: 5000
  e_pre_eval_top_ks: [100, 250, 500, 800]
  e_sim_method: jaccard           # `jaccard` | `pmi`
  e_sim_threshold: 0.10
  e_sim_top_k_per_node: 20

# --- DAG audit settings ---
dag_audit:
  prune_strategy: lowest_confidence_first
  prune_log: results/reports/dag_pruning_log.csv

# --- Augmentation sweep for DAG Disruption Rate ---
augmentation:
  methods: [node_drop, edge_drop, attr_mask, subgraph]
  ps: [0.05, 0.10, 0.20, 0.30]
  seeds: [42, 17, 1234]

# --- Cold-start KC stratification ---
cold_start:
  bins:
    - [-1, 19]              # very cold:    < 20 train interactions
    - [20, 99]              # cold:         20-99
    - [100, 499]            # warm:         100-499
    - [500, 10000000]       # hot:          >= 500
  metrics: [auc, acc, nll]

# --- Baseline diagnostic ---
baselines:
  - name: bkt
    enabled: true
  - name: dkt
    enabled: true
    hyperparams:
      hidden_dim: 100
      lr: 0.001
      epochs: 30
      batch_size: 64
  - name: simplekt
    enabled: true
  - name: akt
    enabled: true
  - name: gkt
    enabled: true
  - name: gikt
    enabled: true
  - name: skt
    enabled: true
  - name: dygkt
    enabled: true
  - name: dgekt
    enabled: true

graph_ablation:
  enabled: true
  models: [gkt, gikt, skt, dygkt, dgekt]
  trained_leakage_head:
    enabled: true
    epochs: 15
    batch_size: 65536
    lr: 0.25
    l2: 1.0e-4

evaluation:
  baseline_backend: diagnostic   # use ``pykt`` with extras torch + pykt-toolkit (see pyproject optional-dependencies)

pykt:
  max_seq_len: 200
  gkt_graph_tag: p0_protocol
  epochs: 30
  batch_size: 64
  lr: 0.001

# --- Logging ---
logging:
  level: INFO
  experiment_log: logs/experiment_log.csv
  leakage_audit_log: logs/leakage_audit_log.csv
